spring:
  application:
    name: fridge_server

  datasource:
    url: jdbc:postgresql://localhost:5433/fridge_db
    username: fridge_user
    password: fridge_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: fridge-hikari-pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # 커넥션 획득 시마다 search_path를 명시적으로 설정
      # vector 타입은 public 스키마에 등록되므로 public이 반드시 포함돼야 함
      connection-init-sql: SET search_path TO fridge_schema, vector_schema, public

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate        # Flyway? DDL ??
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
        default_schema: fridge_schema
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false
    defer-datasource-initialization: false   # Flyway 먼저 실행 후 JPA 초기화

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5433/fridge_db
    user: fridge_user
    password: fridge_secret
    schemas: fridge_schema
    default-schema: fridge_schema
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6380
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-key-here}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2
      embedding:
        options:
          model: text-embedding-3-small

    vectorstore:
      pgvector:
        schema-name: vector_schema       # ??? fridge_schema? ??
        table-name: food_knowledge        # ShelfLife RAG ????? ???
        index-type: HNSW                  # 1.0.0: ???? ?? ?? (hnsw? OK)
        distance-type: COSINE_DISTANCE    # 1.0.0: COSINE_DISTANCE (cosine_distance? OK)
        dimensions: 1536                  # text-embedding-3-small ???
        initialize-schema: true           # Spring AI? food_knowledge ??? ?? ??

  docker:
    compose:
      enabled: true
      file: compose.yaml

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.refridge: DEBUG
    org.springframework.data.redis: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

fridge:
  core-server:
    base-url: http://localhost:8080
    timeout:
      connect: 5s
      read: 10s
  redis:
    stream:
      recognition-completed: recognition:completed
      consumer-group: fridge-fill-group
    pubsub:
      near-expiry-channel: fridge:near-expiry
  expiry:
    near-threshold-days: 3