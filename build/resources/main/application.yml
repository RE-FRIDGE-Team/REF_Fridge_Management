spring:
  application:
    name: fridge_server

  # ?? DataSource (PostgreSQL ?? ????, ??? ?? 5433) ???????????
  datasource:
    url: jdbc:postgresql://localhost:5433/fridge_db?currentSchema=fridge_schema
    username: fridge_user
    password: fridge_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: fridge-hikari-pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ?? JPA ??????????????????????????????????????????????????????????????
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate        # Flyway? DDL ??
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
        default_schema: fridge_schema
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  # ?? Flyway ???????????????????????????????????????????????????????????
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5433/fridge_db
    user: fridge_user
    password: fridge_secret
    schemas: fridge_schema
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ?? Redis (??? ?? 6380, core_server 6379? ?? ??) ????????????
  data:
    redis:
      host: localhost
      port: 6380
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # ?? Spring AI ????????????????????????????????????????????????????????
  # ????: spring-ai-starter-model-openai (1.0.0 GA ?? ??)
  # ???? ?? ?? spring.ai.openai.* ??? ??
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-key-here}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2
      embedding:
        options:
          model: text-embedding-3-small

    # ????: spring-ai-starter-vector-store-pgvector (1.0.0 GA ?? ??)
    # ???? ?? spring.ai.vectorstore.pgvector.* ??? ??
    # ? Spring AI VectorStore? spring.datasource? ??? (?? DataSource ???)
    # ? vector_schema? docker/init-schemas.sql?? ?? ???? ??? ?
    vectorstore:
      pgvector:
        schema-name: vector_schema       # ??? fridge_schema? ??
        table-name: food_knowledge        # ShelfLife RAG ????? ???
        index-type: HNSW                  # 1.0.0: ???? ?? ?? (hnsw? OK)
        distance-type: COSINE_DISTANCE    # 1.0.0: COSINE_DISTANCE (cosine_distance? OK)
        dimensions: 1536                  # text-embedding-3-small ???
        initialize-schema: true           # Spring AI? food_knowledge ??? ?? ??

  # ?? Docker Compose ????????????????????????????????????????????????????
  docker:
    compose:
      enabled: true
      file: compose.yaml

# ?? Server (core_server: 8080, fridge_server: 8081) ??????????????????
server:
  port: 8081

# ?? Actuator / Prometheus ?????????????????????????????????????????????
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

# ?? Logging ???????????????????????????????????????????????????????????
logging:
  level:
    com.refridge: DEBUG
    org.springframework.data.redis: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# ?? ??? ?? ???????????????????????????????????????????????????????
fridge:
  core-server:
    base-url: http://localhost:8080
    timeout:
      connect: 5s
      read: 10s
  redis:
    stream:
      recognition-completed: recognition:completed
      consumer-group: fridge-fill-group
    pubsub:
      near-expiry-channel: fridge:near-expiry
  expiry:
    near-threshold-days: 3